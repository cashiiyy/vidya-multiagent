version: "3.9"

services:
  # ── MCP Server (FastAPI) ──────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vidya-mcp-server
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    command: uvicorn mcp_server.server:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Frontend ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vidya-frontend
    env_file: .env
    environment:
      - MCP_SERVER_URL=http://mcp-server:8000
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
    command: >
      streamlit run frontend/app.py
        --server.port=8501
        --server.address=0.0.0.0
        --server.headless=true
    depends_on:
      mcp-server:
        condition: service_healthy

networks:
  default:
    name: vidya-network
